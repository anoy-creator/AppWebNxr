services:
  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: symfony_php
    volumes:
      - ./app:/var/www/app
    working_dir: /var/www/app
    depends_on:
      - db
    environment:
      APP_ENV: dev

  nginx:
    image: nginx:latest
    container_name: symfony_nginx
    ports:
      - "8080:80"
    volumes:
      - ./app:/var/www/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - php

  db:
    image: mariadb:11
    container_name: symfony_db
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: symfony
      MARIADB_USER: symfony
      MARIADB_PASSWORD: symfony
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  node:
    image: node:22
    container_name: symfony_node
    working_dir: /var/www/app
    volumes:
      - ./app:/var/www/app
    tty: true

  discord_bot:
    image: node:22
    container_name: discord_bot
    working_dir: /bot
    volumes:
      - ./bot:/bot
    command: npm start
    tty: true

volumes:
  db_data:
